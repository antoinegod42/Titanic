<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>QCM</title>
</head>
<body>

<div id="menu-container"></div>

<script>
fetch("menu.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("menu-container").innerHTML = data;
  });
</script>
  
<center>
<h1> QCM</h1><br>
<p>Vous pouvez tester vos connaissances ici.<br>Bonne chance !</p>
</center>
  
<div class ="question">
<br><h3 class ="titre">Quel est le dernier plat ajouté ?</h3><br>
  
<div class="reponse">
  <input type="radio" id="tata" name="drone" value="tata">
  <label for="tata">La quiche lorraine</label>
</div>
  
<div class ="reponse">
 <input type="radio" id ="titi" name="drone"  value="titi" />
 <label for = "titi" >La ratatouille  </label>
</div>
  
<div class ="reponse">
  <input type="radio" id="toto" name="drone"  value="toto" />
 <label for ="toto" >Le gratin Dauphinois  </label>
</div>
</div>
    <br>

  <div class ="question">
    <h3 class ="titre"> Quel est le cours de cuisine le plus cher ?</h3><br>
      <select id = "q2">
        <option value="">Votre réponse :</option>
        <option value="1">Saveur gourmandes</option>
        <option value="2">Challenge culinaire</option>
        <option value="3">L'élegance dans l'assiette</option>
    </select>
</div>
    <br><br>
<div class ="question">
    <h3 class ="titre"> Combien de legumes faut-il dans la ratatouille ?</h3><br>
    <input type="text" id="q3" value ="Votre réponse :" onfocus = "this.value =''">
</div>
    <button onclick="corriger(); correction()" class ="valider">Valider</button><br>

    <h2 id="resultat"></h2> <br>

  <div id="correction">

  </div>
   <button onclick="recommencer()" class="recommencer">Recommencer</button>
    <script>
        function corriger() {
            let score = 0;

            var radios =  document.getElementsByName('drone');
            var valeur;
            for(var i = 0; i < radios.length; i++){
            if(radios[i].checked){
              if(radios[i].value == "titi")
              score +=1;
              }
            }

            let q2 = document.getElementById("q2").value;
            if (q2 === "1") {
                score+=1;
            }

            let q3 = document.getElementById("q3").value;
            if (q3 === "5") {
                score+=1;
            }
            if (score == 3){
            document.getElementById("resultat").innerHTML =
            "Votre score est de : " + score + "/3 <br> Bravo!";  
            }else {
            document.getElementById("resultat").innerHTML =
            "Votre score est de : " + score + "/3";
            }
        }
      function correction(){
        document.getElementById("correction").innerHTML = "<h3 class='correctionh'>Quesiont 1: Quel est le dernier plat ajouté ?</h3><br><ol class ='recette'><li>La quiche lorraine</li><li id = 'correction1'>La ratatouille</li><li>Le gratin Dauphinois</li></ol><br><h3 class='correctionh'> Question 2: Quel est le cours de cuisine le plus cher ?</h3><br><input type='text' value ='Saveur gourmandes' id ='correction2'> <br><br><h3 class='correctionh'>Question 3: Combien de legumes faut-il dans la ratatouille ?</h3><br><input type='text' value ='5' id = 'correction3'>"
      }
      function recommencer() {

  var radios = document.getElementsByName('drone');
  for (var i = 0; i < radios.length; i++) {
    radios[i].checked = false;
  }

  document.getElementById("q2").value = "";

  document.getElementById("q3").value = "Votre réponse:";

  document.getElementById("resultat").innerHTML = "";

  document.getElementById("correction").innerHTML = "";
}
    </script>

</body>
</html>
